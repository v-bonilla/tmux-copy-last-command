# Yank the last command (and/or its output) to the system clipboard via
# OSC 52. Relies on OSC 133 A/C markers emitted by zsh — install them
# with scripts/install-osc133.sh. Without those markers both binds are
# no-ops.
#
# `prefix y` seeks back to the previous prompt's A marker (the row the
# command was typed on), then selects forward to end-of-line above the
# next prompt's A marker — so the clipboard contains the command line
# plus its output.
#
# `prefix Y` is identical but passes `-o` to `previous-prompt`, which
# seeks back to the C marker (start of output) instead of A, so the
# clipboard contains only the output.
#
# Both refuse to run inside alternate-screen apps (less, vim, man, …)
# where OSC 133 markers are absent and the bind would otherwise pick up
# unrelated scrollback.
#
# `copy-pipe-and-cancel` stashes the selection in tmux's paste buffer;
# the trailing `run-shell` forwards it to the outer terminal via OSC 52
# (load-buffer -w). Requires a terminal emulator that handles OSC 52
# (Ghostty, iTerm2, WezTerm, kitty, recent xterm, …).
bind-key y if-shell -F '#{alternate_on}' \
  "display-message 'copy-last-command: unavailable in alternate screen'" \
  "copy-mode ; \
   send-keys -X clear-selection ; \
   send-keys -X previous-prompt ; \
   send-keys -X begin-selection ; \
   send-keys -X next-prompt ; \
   send-keys -X cursor-up ; \
   send-keys -X end-of-line ; \
   send-keys -X copy-pipe-and-cancel ; \
   run-shell -b 'tmux save-buffer - | tmux load-buffer -w -'"

bind-key Y if-shell -F '#{alternate_on}' \
  "display-message 'copy-last-output: unavailable in alternate screen'" \
  "copy-mode ; \
   send-keys -X clear-selection ; \
   send-keys -X previous-prompt -o ; \
   send-keys -X begin-selection ; \
   send-keys -X next-prompt ; \
   send-keys -X cursor-up ; \
   send-keys -X end-of-line ; \
   send-keys -X copy-pipe-and-cancel ; \
   run-shell -b 'tmux save-buffer - | tmux load-buffer -w -'"
